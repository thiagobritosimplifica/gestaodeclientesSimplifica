<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simplifica — Sistema de Gestão de Clientes e Reuniões de Acompanhamento">
  <title>Simplifica — Gestão de Clientes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231e88e5'/><text x='50%25' y='57%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Poppins,Inter,sans-serif' font-weight='700' font-size='20'>s</text></svg>">
</head>
<body>

  <!-- ======== HEADER ======== -->
  <header class="header" id="appHeader">
    <div class="header-left">
      <a href="." class="logo" aria-label="Simplifica — início">
        <img src="logo.png" alt="Simplifica — Aceleradora de Negócios" class="logo-img"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <span class="logo-fallback">
          <span class="logo-text">simplifica</span>
          <span class="logo-tagline">Aceleradora de Negócios</span>
        </span>
      </a>
      <div class="header-divider"></div>
      <span class="header-title">Gestão de Clientes — Reuniões</span>
    </div>
    <div class="header-right">
      <div class="header-date">
        <div class="header-date-day" id="headerDateDay"></div>
        <div class="header-date-full" id="headerDateFull"></div>
      </div>
      <button class="btn-new-client" id="btnNewClient">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>Novo Cliente</span>
      </button>
    </div>
  </header>

  <!-- ======== FILTERS ======== -->
  <div class="filters-bar" id="filtersBar">
    <span class="filter-label">Filtrar:</span>
    <button class="filter-btn active" data-filter="todos">Todos</button>
    <button class="filter-btn" data-filter="em_andamento">Em andamento</button>
    <button class="filter-btn" data-filter="finalizados">Finalizados</button>
    <div class="filter-separator"></div>
    <div class="closer-filters" id="closerFilters"></div>
    <button class="manage-closers-btn" id="btnManageClosers" title="Gerenciar responsáveis" aria-label="Gerenciar responsáveis">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
    </button>

    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="searchInput" class="search-input" placeholder="Buscar cliente, projeto..." autocomplete="off" aria-label="Buscar clientes">
    </div>

    <div class="stats-summary">
      <div class="stat-item">
        <span class="stat-dot active"></span>
        Em andamento: <span class="stat-count" id="statActive">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot done"></span>
        Finalizados: <span class="stat-count" id="statDone">0</span>
      </div>
    </div>
  </div>

  <!-- ======== MAIN CONTENT ======== -->
  <main class="main-content">
    <div class="cards-grid" id="cardsGrid">
      <!-- Cards rendered by JS -->
    </div>
  </main>

  <!-- ======== MODAL — NOVO / EDITAR CLIENTE ======== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Novo Cliente</h2>
        <button class="modal-close" id="modalClose" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="formClientName">Nome do Cliente <span class="required">*</span></label>
          <input type="text" class="form-input" id="formClientName" placeholder="Ex: Empresa XYZ" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="formProjectName">Nome do Projeto <span class="required">*</span></label>
          <input type="text" class="form-input" id="formProjectName" placeholder="Ex: Implementação CRM" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="formDate">Data da 1ª Reunião (Onboarding) <span class="required">*</span></label>
          <input type="date" class="form-input" id="formDate">
        </div>
        <div class="form-group">
          <label class="form-label" for="formCloser">Responsável <span class="required">*</span></label>
          <select class="form-select" id="formCloser">
            <option value="" disabled selected>Selecione o responsável</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="formObs">Observações</label>
          <textarea class="form-textarea" id="formObs" placeholder="Notas opcionais sobre o cliente..."></textarea>
        </div>

        <!-- Meetings Preview -->
        <div class="form-preview" id="meetingsPreview" style="display: none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">Cancelar</button>
        <button class="btn-save" id="btnSave">Salvar Cliente</button>
      </div>
    </div>
  </div>

  <!-- ======== MODAL — CONFIRMAR EXCLUSÃO ======== -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal" style="max-width: 420px;" role="alertdialog" aria-modal="true" aria-labelledby="deleteTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="deleteTitle">Confirmar Exclusão</h2>
        <button class="modal-close" id="deleteClose" aria-label="Fechar">✕</button>
      </div>
      <div class="confirm-dialog">
        <div class="confirm-dialog-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>
        <h3>Tem certeza?</h3>
        <p>O cliente <strong id="deleteClientName"></strong> será removido permanentemente com todas as suas reuniões.</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="btn-cancel" id="btnDeleteCancel">Cancelar</button>
          <button class="btn-delete" id="btnDeleteConfirm">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ======== MODAL — GERENCIAR RESPONSÁVEIS ======== -->
  <div class="modal-overlay" id="closersOverlay">
    <div class="modal" style="max-width: 440px;" role="dialog" aria-modal="true" aria-labelledby="closersTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="closersTitle">Responsáveis</h2>
        <button class="modal-close" id="closersClose" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body">
        <div class="closer-add-row">
          <input type="text" class="form-input" id="newCloserName" placeholder="Nome do novo responsável" maxlength="30" autocomplete="off">
          <button class="btn-save" id="btnAddCloser">Adicionar</button>
        </div>
        <div class="closers-list" id="closersList"></div>
      </div>
    </div>
  </div>

  <!-- ======== TOAST CONTAINER ======== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ======== APP SCRIPT ======== -->
  <script src="app.js"></script>
</body>
</html>
